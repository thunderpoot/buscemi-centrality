name: Refresh Datatracker snapshot

on:
  schedule:
    # Weekly, Monday 05:17 UTC. Odd minute to avoid clashing with other
    # scheduled jobs on the hour.
    - cron: "17 5 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (one page per endpoint, no commit)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh snapshot
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 scripts/refresh-snapshot.py --dry-run
          else
            python3 scripts/refresh-snapshot.py
          fi

      - name: Show diff
        run: |
          git --no-pager diff --stat docs/data/ || true

      - name: Commit and push if changed
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          if git diff --cached --quiet; then
            echo "No snapshot changes; nothing to commit."
            exit 0
          fi
          # Summarise the diff in the commit message (row counts).
          DA_ROWS=$(python3 -c "import json;print(json.load(open('docs/data/documentauthor.json'))['count'])")
          PP_ROWS=$(python3 -c "import json;print(json.load(open('docs/data/persons.json'))['count'])")
          git commit -m "chore: refresh Datatracker snapshot (${DA_ROWS} authorships, ${PP_ROWS} persons) [skip ci]"
          git push
