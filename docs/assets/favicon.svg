<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Buscemi Centrality">
  <title>Buscemi Centrality</title>
  <!-- outer disc -->
  <circle cx="32" cy="32" r="30" fill="#0a0a0a"/>
  <!-- satellite nodes -->
  <g fill="#b45309" stroke="#fbbf24" stroke-width="1.5">
    <circle cx="16" cy="16" r="5"/>
    <circle cx="48" cy="16" r="5"/>
    <circle cx="14" cy="44" r="5"/>
    <circle cx="50" cy="46" r="5"/>
  </g>
  <!-- spokes to source -->
  <g stroke="#fbbf24" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.85">
    <line x1="32" y1="32" x2="16" y2="16"/>
    <line x1="32" y1="32" x2="48" y2="16"/>
    <line x1="32" y1="32" x2="14" y2="44"/>
    <line x1="32" y1="32" x2="50" y2="46"/>
  </g>
  <!-- central source node -->
  <circle cx="32" cy="32" r="9" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
</svg>
